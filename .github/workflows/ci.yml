name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore InvoiceTracker.sln

      - name: Build
        run: dotnet build InvoiceTracker.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InvoiceTracker.Tests/InvoiceTracker.Tests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-tracker-client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invoice-tracker-client/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
